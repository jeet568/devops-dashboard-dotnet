name: Security Scan

on:
  push:
    branches:
      - main
  schedule:
    # Run at 02:00 UTC every Monday — catches new CVEs even without code changes
    - cron: "0 2 * * 1"

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            -t devops-dashboard:scan \
            ./DevOpsDashboard.API

      # Trivy scans for OS and library vulnerabilities.
      # Results appear in GitHub Security → Code Scanning tab.
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-dashboard:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # Don't fail the build — report only

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-dashboard:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"